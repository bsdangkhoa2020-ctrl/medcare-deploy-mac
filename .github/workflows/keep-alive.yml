name: Keep Supabase Alive

# Mục đích: Ping Supabase mỗi ngày để project không bị pause sau 7 ngày
# v3: Thêm apikey header (publishable key, public OK)

on:
  schedule:
    # '0 2 * * *' = 02:00 UTC mỗi ngày = 09:00 VN (UTC+7)
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping Supabase Auth Settings
        run: |
          # /auth/v1/settings là public endpoint, trả về config public của Auth
          # Cần apikey header — publishable key OK vì thiết kế để public
          SUPABASE_URL="https://tnehhratorbrxjwzqnds.supabase.co"
          SUPABASE_KEY="sb_publishable_LOy3f6W1wHHYsMIlr_zvxQ_gruUztNP"

          echo "Pinging Supabase at $(date -u)..."

          response=$(curl -sS -w "\nHTTP_CODE:%{http_code}" \
            -H "apikey: $SUPABASE_KEY" \
            "$SUPABASE_URL/auth/v1/settings")

          http_code=$(echo "$response" | grep "HTTP_CODE:" | cut -d: -f2)
          body=$(echo "$response" | sed '/HTTP_CODE:/d' | head -c 200)

          echo "HTTP Status: $http_code"
          echo "Response (first 200 chars): $body"

          if [ "$http_code" = "200" ]; then
            echo "✅ Supabase is alive and responding"
            exit 0
          else
            echo "❌ Supabase ping failed with HTTP $http_code"
            exit 1
          fi

      - name: Notify on failure (optional)
        if: failure()
        run: |
          echo "⚠️ Keep-alive failed! BS Tuấn cần check Supabase Dashboard."
