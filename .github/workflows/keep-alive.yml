name: Keep Supabase Alive

# Mục đích: Ping Supabase mỗi ngày để project không bị pause sau 7 ngày
# Tài liệu: https://supabase.com/docs/guides/platform/going-into-prod

on:
  schedule:
    # Cron syntax: phút giờ ngày tháng thứ
    # '0 2 * * *' = 02:00 UTC mỗi ngày = 09:00 VN (UTC+7)
    # Chạy vào sáng để nếu lỗi, BS có thời gian fix trước khi BN dùng
    - cron: '0 2 * * *'

  # Cho phép chạy thủ công từ GitHub Actions tab (để test)
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping Supabase REST API
        run: |
          # URL Supabase project + endpoint health check
          # Dùng REST API public — chỉ check kết nối, không cần auth
          # Publishable key OK để public (Supabase thiết kế để vậy)

          SUPABASE_URL="https://tnehhratorbrxjwzqnds.supabase.co"
          SUPABASE_KEY="sb_publishable_LOy3f6W1wHHYsMIlr_zvxQ_gruUztNP"

          echo "Pinging Supabase at $(date -u)..."

          # Gọi REST API để query 1 row từ bảng profiles
          # → Supabase coi như "có hoạt động" → reset timer 7 days
          response=$(curl -sS -w "\nHTTP_CODE:%{http_code}" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/profiles?limit=1&select=id")

          http_code=$(echo "$response" | grep "HTTP_CODE:" | cut -d: -f2)
          body=$(echo "$response" | sed '/HTTP_CODE:/d')

          echo "HTTP Status: $http_code"
          echo "Response: $body"

          # Check kết quả
          if [ "$http_code" = "200" ]; then
            echo "✅ Supabase is alive and responding"
            exit 0
          else
            echo "❌ Supabase ping failed with HTTP $http_code"
            echo "Có thể project đã bị pause hoặc network lỗi"
            exit 1
          fi

      - name: Notify on failure (optional)
        if: failure()
        run: |
          echo "⚠️ Keep-alive failed! BS Tuấn cần check Supabase Dashboard."
          # Tương lai: gửi email/Slack/Zalo notification
